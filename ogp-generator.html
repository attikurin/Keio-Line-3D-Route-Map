<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>OGP画像ジェネレーター</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0c0f15;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
      color: #fff;
      padding: 24px;
      gap: 20px;
    }
    h1 { font-size: 16px; color: #9aa6b2; }
    canvas {
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(210,34,127,0.3);
      max-width: 100%;
    }
    #btn-dl {
      margin-top: 8px;
      padding: 14px 48px;
      background: #d2227f;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }
    #btn-dl:hover { background: #e0379a; }
    p { font-size: 13px; color: #9aa6b2; text-align: center; line-height: 1.7; }
  </style>
</head>
<body>
  <h1>📸 OGP / SNS共有用バナー画像</h1>
  <canvas id="c" width="1200" height="630"></canvas>
  <button id="btn-dl">⬇️ PNG画像をダウンロード</button>
  <p>ダウンロードした <strong>ogp.png</strong> をFacebookの投稿に添付してください。<br>
     リンク共有時の自動サムネイルはサイト公開後に自動で反映されます。</p>

  <script>
  (async () => {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 1200, H = 630;

    /* ---- 背景グラデーション ---- */
    const bgGrad = ctx.createRadialGradient(W/2, H*0.4, 0, W/2, H/2, W*0.75);
    bgGrad.addColorStop(0,   '#1a2540');
    bgGrad.addColorStop(0.5, '#0d1220');
    bgGrad.addColorStop(1,   '#060810');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    /* ---- 星のような粒子 ---- */
    ctx.save();
    const rng = mulberry32(42);
    for (let i = 0; i < 180; i++) {
      const x = rng() * W, y = rng() * H;
      const r = rng() * 1.4 + 0.4;
      const a = rng() * 0.5 + 0.2;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${a})`;
      ctx.fill();
    }
    ctx.restore();

    /* ---- 路線カラーのグロー帯 ---- */
    const lines = [
      { color: '#d2227f', y: H*0.52, x1: W*0.08, x2: W*0.92, w: 4, label: '京王線' },
      { color: '#0a7bd6', y: H*0.59, x1: W*0.42, x2: W*0.88, w: 3, label: '相模原線' },
      { color: '#2faa3f', y: H*0.63, x1: W*0.66, x2: W*0.94, w: 3, label: '高尾線' },
      { color: '#7a3fb0', y: H*0.45, x1: W*0.06, x2: W*0.38, w: 3, label: '井の頭線' },
      { color: '#f0a000', y: H*0.49, x1: W*0.06, x2: W*0.24, w: 2, label: '京王新線' },
    ];

    lines.forEach(({ color, y, x1, x2, w }) => {
      // グロー
      for (let g = 12; g >= 1; g--) {
        ctx.beginPath();
        ctx.moveTo(x1, y);
        ctx.lineTo(x2, y);
        ctx.strokeStyle = color + Math.round(g * 8).toString(16).padStart(2,'0');
        ctx.lineWidth = w + g * 2.5;
        ctx.stroke();
      }
      // 本線
      ctx.beginPath();
      ctx.moveTo(x1, y);
      ctx.lineTo(x2, y);
      ctx.strokeStyle = color;
      ctx.lineWidth = w;
      ctx.stroke();
    });

    /* ---- 駅マーカー ---- */
    const stations = [
      { x: W*0.08,  y: H*0.52, label: '新宿',     r: 6,  lc: '#d2227f' },
      { x: W*0.24,  y: H*0.52, label: '明大前',   r: 4,  lc: '#d2227f' },
      { x: W*0.42,  y: H*0.52, label: '調布',     r: 6,  lc: '#d2227f' },
      { x: W*0.62,  y: H*0.52, label: '府中',     r: 5,  lc: '#d2227f' },
      { x: W*0.78,  y: H*0.52, label: '高幡不動', r: 5,  lc: '#d2227f' },
      { x: W*0.88,  y: H*0.52, label: '北野',     r: 5,  lc: '#d2227f' },
      { x: W*0.92,  y: H*0.52, label: '八王子',   r: 5,  lc: '#d2227f' },
      { x: W*0.42,  y: H*0.59, label: '調布',     r: 4,  lc: '#0a7bd6' },
      { x: W*0.66,  y: H*0.59, label: '多摩C',    r: 4,  lc: '#0a7bd6' },
      { x: W*0.88,  y: H*0.59, label: '橋本',     r: 5,  lc: '#0a7bd6' },
      { x: W*0.06,  y: H*0.45, label: '渋谷',     r: 5,  lc: '#7a3fb0' },
      { x: W*0.38,  y: H*0.45, label: '吉祥寺',   r: 5,  lc: '#7a3fb0' },
    ];

    stations.forEach(({ x, y, r, lc }) => {
      // グロー
      const grd = ctx.createRadialGradient(x, y, 0, x, y, r * 5);
      grd.addColorStop(0, lc + 'aa');
      grd.addColorStop(1, lc + '00');
      ctx.beginPath();
      ctx.arc(x, y, r * 5, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
      // 白丸
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
    });

    /* ---- 路線名ラベル（小） ---- */
    ctx.font = 'bold 14px "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif';
    ctx.textBaseline = 'middle';
    lines.forEach(({ color, y, x2, label }) => {
      ctx.fillStyle = color;
      ctx.fillText(label, x2 + 6, y);
    });

    /* ---- 電車シンボル ---- */
    drawTrain(ctx, W*0.31, H*0.52 - 7, '#d2227f', 1);
    drawTrain(ctx, W*0.57, H*0.45 - 7, '#7a3fb0', -1);
    drawTrain(ctx, W*0.72, H*0.59 - 7, '#0a7bd6', 1);

    /* ---- メインタイトル ---- */
    // 薄いグロー背景
    const titleGrd = ctx.createLinearGradient(0, H*0.05, 0, H*0.40);
    titleGrd.addColorStop(0, 'rgba(0,0,0,0.0)');
    titleGrd.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = titleGrd;
    ctx.fillRect(0, 0, W, H*0.42);

    // 京王ピンクのアクセントライン
    ctx.fillStyle = '#d2227f';
    ctx.fillRect(W*0.06, H*0.10, 6, H*0.26);

    // メインタイトル
    ctx.font = `bold 72px "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif`;
    ctx.textBaseline = 'top';
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = 'rgba(210,34,127,0.6)';
    ctx.shadowBlur = 20;
    ctx.fillText('京王電鉄', W*0.10, H*0.09);
    ctx.shadowBlur = 0;

    ctx.font = `bold 52px "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif`;
    ctx.fillStyle = '#e8eef4';
    ctx.fillText('3D 路線図ビューア', W*0.10, H*0.09 + 80);

    /* ---- サブタイトル ---- */
    ctx.font = `500 26px "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif`;
    ctx.fillStyle = '#9ecfff';
    ctx.fillText('全 7 路線・全 76 駅  ／  実ダイヤ再現  ／  特急・急行・各停が走る', W*0.10, H*0.09 + 148);

    /* ---- フィーチャーチップ ---- */
    const chips = [
      { text: '🚃 電車がリアルに走る', x: W*0.10 },
      { text: '⏱ 実際のダイヤ再現', x: W*0.38 },
      { text: '🖱 360度回転・ズーム', x: W*0.65 },
    ];
    chips.forEach(({ text, x }) => {
      const cx = x;
      const cy = H*0.795;
      const tw = ctx.measureText(text).width;
      ctx.font = `500 22px "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif`;
      // 背景ピル
      ctx.fillStyle = 'rgba(255,255,255,0.10)';
      roundRect(ctx, cx - 8, cy - 18, tw + 28, 42, 21);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = '#ffffff';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, cx + 6, cy + 3);
    });

    /* ---- URLプレースホルダー ---- */
    ctx.font = `400 18px "SF Mono", Consolas, monospace`;
    ctx.fillStyle = '#d2227f';
    ctx.textBaseline = 'bottom';
    ctx.fillText('▶  あなたのサイトURL をここに', W*0.10, H - 28);

    /* ---- 右下：3Dバッジ ---- */
    ctx.save();
    ctx.translate(W - 80, H - 80);
    const badgeGrd = ctx.createRadialGradient(0,0,0, 0,0,52);
    badgeGrd.addColorStop(0, '#d2227f');
    badgeGrd.addColorStop(1, '#7b1450');
    ctx.beginPath();
    ctx.arc(0, 0, 52, 0, Math.PI*2);
    ctx.fillStyle = badgeGrd;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.font = `bold 32px "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('3D', 0, 0);
    ctx.restore();

    /* ---- ダウンロードボタン ---- */
    document.getElementById('btn-dl').addEventListener('click', () => {
      const a = document.createElement('a');
      a.download = 'ogp_keio3d.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    });

    /* ---- ヘルパー ---- */
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x+r, y);
      ctx.arcTo(x+w, y, x+w, y+h, r);
      ctx.arcTo(x+w, y+h, x, y+h, r);
      ctx.arcTo(x, y+h, x, y, r);
      ctx.arcTo(x, y, x+w, y, r);
      ctx.closePath();
    }

    function drawTrain(ctx, x, y, color, dir) {
      const W2 = 32, H2 = 14;
      ctx.save();
      ctx.translate(x, y);
      if (dir < 0) ctx.scale(-1, 1);
      // 車体
      ctx.fillStyle = '#f0f4f8';
      roundRect(ctx, -W2/2, -H2/2, W2, H2, 4);
      ctx.fill();
      // 帯
      ctx.fillStyle = color;
      ctx.fillRect(-W2/2, -2, W2, 5);
      // 前面窓
      ctx.fillStyle = '#1a2a38';
      roundRect(ctx, W2/2 - 10, -H2/2 + 2, 8, H2 - 4, 2);
      ctx.fill();
      // ヘッドライト
      ctx.fillStyle = '#ffffaa';
      ctx.fillRect(W2/2 - 2, -H2/2 + 3, 2.5, 3);
      ctx.fillRect(W2/2 - 2, H2/2 - 6, 2.5, 3);
      ctx.restore();
    }

    function mulberry32(a) {
      return function() {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        let t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      }
    }
  })();
  </script>
</body>
</html>
